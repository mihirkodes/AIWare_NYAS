<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIware — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --dc-bar:      #1e1f22;
      --dc-sidebar:  #2b2d31;
      --dc-main:     #313338;
      --dc-elevated: #383a40;
      --blue:        #3b82f6;
      --blue-lt:     #60a5fa;
      --blue-glow:   rgba(59,130,246,0.35);
      --cyan:        #38bdf8;
      --text:        #dbdee1;
      --text-bright: #f2f3f5;
      --muted:       #949ba4;
      --border:      rgba(255,255,255,0.06);
      --r:           8px;
      --r-btn:       50px;
      --error:       #f87171;
      --error-bg:    rgba(248,113,113,0.1);
      --success:     #34d399;
      --success-bg:  rgba(52,211,153,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: var(--dc-main);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.15) 0%, transparent 70%),
        radial-gradient(rgba(59,130,246,0.08) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }

    .card {
      background: var(--dc-sidebar);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--blue-lt), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 6px;
    }

    .card-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--dc-main);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 14px;
      color: var(--text-bright);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--r-btn);
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn:hover { background: var(--blue-lt); box-shadow: 0 0 20px var(--blue-glow); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      display: none;
      padding: 10px 14px;
      border-radius: var(--r);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .alert.error   { display: block; background: var(--error-bg);   color: var(--error);   border: 1px solid rgba(248,113,113,0.25); }
    .alert.success { display: block; background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--blue-lt);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">AIware</div>
    <p class="card-subtitle">Create your free account</p>

    <div class="alert" id="alert"></div>

    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your name" autocomplete="name" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
    </div>

    <button class="btn" id="register-btn" onclick="register()">Create Account</button>

    <div class="divider"></div>

    <div class="footer-link">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://lhqdgwzflevedkpgqafm.supabase.co',
      'sb_publishable_HHsJdDgkNFDOwEGrHPdjRg_nM92YML1'
    );

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = 'alert ' + type;
    }

    function clearAlert() {
      const alert = document.getElementById('alert');
      alert.className = 'alert';
    }

    async function register() {
      clearAlert();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('register-btn');

      if (!name) return showAlert('Please enter your name.', 'error');
      if (!email) return showAlert('Please enter your email.', 'error');
      if (password.length < 6) return showAlert('Password must be at least 6 characters.', 'error');

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      btn.disabled = false;
      btn.textContent = 'Create Account';

      if (error) {
        showAlert(error.message, 'error');
        return;
      }

      showAlert('Account created! You can now log in.', 'success');
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });
  </script>

</body>
</html>
